<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shanghai Travel Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0c09;--bg2:#181410;--bg3:#201c16;--bg4:#2a2420;
  --red:#C8102E;--red2:#e01530;--gold:#D4A030;--gold2:#f0b838;
  --white:#f0ebe0;--muted:#5a5040;--muted2:#8a7a68;
  --border:#2a2318;--border2:#3a3228;--green:#2a7a50;--blue:#1a5a9a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column;}

/* HEADER */
header{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;}
.hd-bar{width:4px;height:30px;background:linear-gradient(180deg,var(--red),var(--gold));border-radius:2px;margin-right:16px;}
.hd-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--white);}
.hd-sep{width:1px;height:22px;background:var(--border2);margin:0 14px;}
.hd-sub{font-size:11px;color:var(--muted2);letter-spacing:1px;}
.hd-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.pill{padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:1px;}
.pill-r{background:var(--red);color:#fff;}
.pill-g{background:var(--gold);color:var(--bg);}

/* LAYOUT */
.app{display:grid;grid-template-columns:420px 1fr;flex:1;overflow:hidden;height:calc(100vh - 54px);}
.sidebar{display:flex;flex-direction:column;background:var(--bg2);border-right:1px solid var(--border);overflow:hidden;}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;height:46px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:500;color:var(--muted2);cursor:pointer;border:none;background:none;transition:all .2s;border-bottom:2px solid transparent;}
.tab.active{color:var(--white);border-bottom-color:var(--red);background:rgba(200,16,46,.06);}
.tab:hover:not(.active){color:var(--white);}

/* PANEL */
.panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.panel.active{display:flex;}
.ph{padding:13px 16px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;}
.ph-label{font-size:9px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:9px;text-transform:uppercase;}

/* INPUTS */
.si{flex:1;padding:9px 13px;background:var(--bg4);border:1px solid var(--border2);border-radius:3px;font-size:13px;font-family:inherit;color:var(--white);outline:none;transition:border-color .2s;}
.si:focus{border-color:var(--red);}.si::placeholder{color:var(--muted2);}
.srow{display:flex;gap:8px;}
.hint{font-size:10px;color:var(--muted2);margin-top:7px;line-height:1.5;}

/* BUTTONS */
.btn{padding:9px 15px;border:none;border-radius:3px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:1px;text-transform:uppercase;}
.btn-r{background:var(--red);color:#fff;}.btn-r:hover{background:var(--red2);}
.btn-g{background:var(--gold);color:var(--bg);}.btn-g:hover{background:var(--gold2);}
.btn-sm{padding:5px 10px;font-size:10px;}
.btn-gh{background:none;border:1px solid var(--border2);color:var(--muted2);padding:5px 10px;font-size:11px;border-radius:3px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-gh:hover{border-color:var(--muted2);color:var(--white);}
.btn-del{background:none;border:1px solid #4a1a1a;color:#c05050;border-radius:3px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-del:hover{background:#2a0808;}

/* SCROLL LIST */
.sl{flex:1;overflow-y:auto;padding:10px 11px;display:flex;flex-direction:column;gap:7px;}
.sl::-webkit-scrollbar{width:4px;}.sl::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* RESULT CARDS */
.rc{background:var(--bg3);border:1px solid var(--border);border-radius:4px;display:flex;align-items:stretch;transition:border-color .18s;}
.rc:hover{border-color:var(--border2);}
.rc.sel{border-color:var(--red);}
.rc-accent{width:3px;flex-shrink:0;border-radius:4px 0 0 4px;background:transparent;transition:background .18s;}
.rc:hover .rc-accent,.rc.sel .rc-accent{background:var(--red);}
.rc-body{flex:1;padding:12px 12px 10px;cursor:pointer;min-width:0;}
.rc-type-badge{padding:2px 7px;border-radius:2px;font-size:9px;font-weight:600;background:var(--bg4);color:var(--muted2);border:1px solid var(--border2);white-space:nowrap;}
.rc-name{font-size:13px;font-weight:500;color:var(--white);margin:5px 0 3px;}
.rc-addr{font-size:11px;color:var(--muted2);line-height:1.5;margin-bottom:8px;}
.rc-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.rc-save-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px;border-left:1px solid var(--border);flex-shrink:0;background:var(--bg4);cursor:pointer;transition:background .15s;min-width:58px;}
.rc-save-col:hover{background:rgba(255,255,255,.04);}
.rc-save-col.saved{background:rgba(212,160,48,.08);border-left-color:rgba(212,160,48,.25);}
.save-star{font-size:22px;line-height:1;filter:grayscale(1) opacity(.3);transition:all .2s;}
.rc-save-col.saved .save-star{filter:none;}
.save-label{font-size:9px;color:var(--muted2);margin-top:5px;letter-spacing:.5px;font-weight:600;text-transform:uppercase;}
.rc-save-col.saved .save-label{color:var(--gold);}
.amap-a{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#5a90d0;text-decoration:none;padding:4px 9px;border:1px solid #1a3050;border-radius:3px;background:rgba(26,90,154,.08);transition:all .15s;font-family:inherit;}
.amap-a:hover{background:var(--blue);color:#fff;}
.map-btn{font-size:10px;color:var(--muted2);padding:4px 9px;border:1px solid var(--border2);border-radius:3px;background:var(--bg4);cursor:pointer;font-family:inherit;transition:all .15s;}
.map-btn:hover{color:var(--white);}

/* SAVED */
.sv{background:var(--bg3);border:1px solid var(--border);border-radius:6px;flex-shrink:0;}
.sv-h{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;transition:background .15s;min-height:54px;}
.sv-h:hover{background:var(--bg4);}
.sv-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;width:44px;min-height:48px;cursor:pointer;border-radius:8px;border:1.5px solid transparent;transition:all .15s;padding:3px 2px;gap:2px;flex-shrink:0;}
.sv-tile:hover{border-color:rgba(212,160,48,.5);background:rgba(212,160,48,.07);}
.sv-tile-num{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--red);font-weight:900;line-height:1;}
.sv-tile-em{font-size:20px;line-height:1.1;}
.sv-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.sv-nedit{font-size:13px;font-weight:500;color:var(--white);background:none;border:none;outline:none;width:100%;font-family:inherit;padding:0;cursor:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sv-nedit:focus{background:var(--bg4);border-bottom:1px solid var(--red);padding:1px 4px;}
.sv-adr{font-size:10px;color:var(--muted2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sv-exp{color:var(--muted2);cursor:pointer;font-size:15px;background:none;border:none;transition:transform .2s;flex-shrink:0;padding:4px;}
.sv-exp.open{transform:rotate(180deg);color:var(--gold);}
.sv-body{padding:0 13px 12px;border-top:1px solid var(--border);display:none;}
.sv-body.open{display:block;padding-top:10px;}
.memo-lbl{font-size:9px;letter-spacing:2px;color:var(--muted2);font-weight:700;margin-bottom:4px;text-transform:uppercase;}
.memo-ta{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:7px 9px;font-size:12px;color:var(--white);font-family:inherit;outline:none;resize:none;min-height:58px;line-height:1.5;}
.memo-ta:focus{border-color:var(--gold);}.memo-ta::placeholder{color:var(--muted2);}
.sv-ba{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.sv-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}

/* ITINERARY */
/* Day selector tabs */
.day-tab-bar{display:flex;gap:6px;padding:10px 12px;flex-shrink:0;overflow-x:auto;background:var(--bg3);border-bottom:1px solid var(--border);}
.day-tab-bar::-webkit-scrollbar{height:3px;}.day-tab-bar::-webkit-scrollbar-thumb{background:var(--border2);}
.day-tab{padding:5px 12px;border-radius:3px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--muted2);white-space:nowrap;transition:all .18s;flex-shrink:0;}
.day-tab.active{background:var(--red);color:#fff;border-color:var(--red);}
.day-tab:hover:not(.active){border-color:var(--muted2);color:var(--white);}
.day-tab.add-day{background:none;border-style:dashed;color:var(--muted2);}
.day-tab.add-day:hover{border-color:var(--gold);color:var(--gold);}

.its{flex:1;overflow-y:auto;padding:11px;}
.its::-webkit-scrollbar{width:4px;}.its::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Day content panel */
.day-panel{display:none;flex-direction:column;gap:10px;}
.day-panel.active{display:flex;}
.day-header-card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:10px 13px;display:flex;align-items:center;gap:10px;}
.day-num-label{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);letter-spacing:1px;min-width:60px;}
.day-date-input{background:var(--bg4);border:1px solid var(--border2);color:var(--white);padding:4px 9px;border-radius:3px;font-size:11px;font-family:inherit;outline:none;color-scheme:dark;}
.day-map-btn{margin-left:auto;}

/* STOPS */
.stops-container{display:flex;flex-direction:column;gap:0;}
.stop-row{display:flex;user-select:none;}
.stop-row.dragging{opacity:.35;}
.stop-row.drag-over{border-top:2px solid var(--gold);}
.stl{display:flex;flex-direction:column;align-items:center;width:34px;flex-shrink:0;padding-top:3px;}
.st-circ{width:26px;height:26px;border-radius:4px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;box-shadow:0 2px 8px rgba(200,16,46,.4);}
.st-line{width:2px;flex:1;min-height:8px;background:linear-gradient(180deg,rgba(200,16,46,.5),rgba(200,16,46,.1));margin:3px 0;}
.sc{flex:1;padding:0 4px 6px;min-width:0;}
.sc-top{display:flex;align-items:flex-start;gap:5px;}
.sc-name{font-size:13px;font-weight:500;color:var(--white);flex:1;}
.sc-addr{font-size:10px;color:var(--muted2);margin-top:2px;line-height:1.4;}
.sc-time-row{display:flex;gap:6px;align-items:center;margin-top:5px;}
.sc-time{background:var(--bg4);border:1px solid var(--border2);color:var(--white);padding:3px 7px;border-radius:3px;font-size:11px;font-family:'DM Mono',monospace;outline:none;width:88px;color-scheme:dark;}
.drag-h{cursor:grab;color:var(--muted2);font-size:14px;padding:2px 3px;background:none;border:none;align-self:flex-start;margin-top:3px;}
.rm-stop{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:13px;padding:2px 3px;transition:color .15s;align-self:flex-start;margin-top:3px;}
.rm-stop:hover{color:var(--red);}

/* TRANSPORT */
.ts{display:flex;align-items:flex-start;padding:2px 0;}
.ts-tl{width:34px;display:flex;justify-content:center;flex-shrink:0;padding-top:10px;}
.ts-arrow{color:var(--muted2);font-size:11px;opacity:.5;}
.ts-box{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:7px 9px;margin-right:4px;}
.ts-modes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.tm-btn{padding:4px 9px;border-radius:2px;font-size:11px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted2);cursor:pointer;font-family:inherit;transition:all .15s;}
.tm-btn:hover{border-color:var(--muted2);color:var(--white);}
.tm-btn.a-walk{background:rgba(42,122,80,.15);border-color:var(--green);color:#7ecfa0;}
.tm-btn.a-taxi{background:rgba(212,160,48,.15);border-color:var(--gold);color:var(--gold2);}
.tm-btn.a-subway{background:rgba(200,16,46,.15);border-color:var(--red);color:#ff8a9a;}
.tm-btn.a-bus{background:rgba(26,90,154,.15);border-color:#3a70ba;color:#7ab0f0;}
.ts-result{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:11px;min-height:16px;}
.tr-dur{font-family:'DM Mono',monospace;color:var(--white);font-size:12px;background:var(--bg4);padding:2px 7px;border-radius:2px;}
.tr-dist{color:var(--muted2);}
.tr-fare{color:var(--gold);font-family:'DM Mono',monospace;background:rgba(212,160,48,.1);padding:2px 7px;border-radius:2px;border:1px solid rgba(212,160,48,.2);}
.tr-note{color:var(--muted2);font-size:10px;font-style:italic;width:100%;margin-top:2px;}
.tr-load{color:var(--muted2);font-style:italic;font-size:11px;}

/* SUBWAY CARD */
.subway-card{width:100%;}
.subway-summary{display:flex;gap:8px;align-items:center;margin-bottom:7px;flex-wrap:wrap;}
.subway-steps{background:var(--bg);border:1px solid var(--border2);border-radius:3px;overflow:hidden;}
.subway-step{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;}
.subway-step+.subway-step{border-top:1px solid var(--border);}
.step-icon{font-size:13px;flex-shrink:0;margin-top:1px;width:16px;text-align:center;}
.step-body{flex:1;min-width:0;}
.step-line-badge{display:inline-flex;align-items:center;font-size:9px;padding:1px 7px;border-radius:2px;font-weight:700;margin-right:5px;color:#fff;}
.step-desc{font-size:11px;color:var(--white);line-height:1.5;}
.step-detail{font-size:10px;color:var(--muted2);margin-top:1px;}
.step-time{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted2);white-space:nowrap;flex-shrink:0;align-self:center;}

/* ADD STOP */
.add-wrap{padding:8px 0 2px;}
.add-sel{width:100%;padding:7px 10px;background:var(--bg2);border:1px dashed var(--border2);color:var(--muted2);font-family:inherit;font-size:12px;border-radius:3px;cursor:pointer;outline:none;transition:all .15s;}
.add-sel:hover,.add-sel:focus{border-color:var(--gold);color:var(--white);}
.add-sel option{background:var(--bg2);}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:10px;}
.empty-i{font-size:38px;opacity:.25;}.empty-t{font-size:12px;color:var(--muted2);line-height:1.7;}

/* STATUS */
.sbar{padding:5px 14px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted2);flex-shrink:0;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sdot.ld{background:var(--gold);animation:pulse 1s infinite;}

/* MAP */
#map{width:100%;height:100%;background:#0a0806;}

/* NOTIF */
.notif{position:fixed;bottom:22px;right:22px;background:var(--bg2);color:var(--white);padding:11px 17px;border-radius:3px;font-size:12px;border:1px solid var(--border2);border-left:3px solid var(--gold);box-shadow:0 8px 32px rgba(0,0,0,.6);animation:nIn .22s ease;z-index:9999;}
@keyframes nIn{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;display:flex;align-items:center;justify-content:center;}
.modal-bx{background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);border-radius:4px;padding:28px 30px;max-width:470px;width:90%;box-shadow:0 24px 80px rgba(0,0,0,.8);}
.modal-ti{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:8px;}
.modal-mi{width:100%;padding:9px 13px;background:var(--bg4);border:1px solid var(--border2);border-radius:3px;font-size:13px;font-family:inherit;color:var(--white);outline:none;margin-bottom:10px;}
.modal-mi:focus{border-color:var(--red);}
.modal-desc{font-size:12px;color:var(--muted2);line-height:1.7;margin-bottom:14px;}
.modal-acts{display:flex;gap:8px;}

/* EMOJI PICKER */
.sv-tile:hover .sv-tile-em{transform:scale(1.1);}
.sv-tile-em{transition:transform .15s;}
#ep-guide{position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;box-shadow:0 16px 48px rgba(0,0,0,.85);padding:14px;width:240px;display:flex;flex-direction:column;gap:10px;}
.ep-title{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.ep-field{width:100%;padding:12px;background:var(--bg4);border:2px solid var(--border2);border-radius:8px;font-size:28px;color:var(--white);outline:none;font-family:inherit;text-align:center;transition:border-color .2s;}
.ep-field:focus{border-color:var(--gold);}
.ep-field::placeholder{font-size:12px;color:var(--muted2);}
.ep-hint{font-size:10px;color:var(--muted2);text-align:center;line-height:1.6;}
.ep-hint strong{color:var(--white);}
.ep-divider{height:1px;background:var(--border);}
.ep-recent-lbl{font-size:9px;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.ep-recent{display:flex;flex-wrap:wrap;gap:5px;}
.ep-em{font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:7px;border:1px solid var(--border);background:var(--bg3);transition:all .12s;}
.ep-em:hover{background:rgba(212,160,48,.1);border-color:var(--gold);transform:scale(1.1);}

/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — 768px 이하
   레이아웃: 지도(상단) + 하단 슬라이딩 시트
═══════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* 스크롤 가능하게 */
  html,body { overflow: hidden; height: 100%; height: 100dvh; }

  /* 헤더 축소 */
  header { height: 46px; padding: 0 14px; }
  .hd-bar { height: 24px; margin-right: 10px; }
  .hd-title { font-size: 18px; letter-spacing: 2px; }
  .hd-sep, .hd-sub { display: none; }
  .pill { font-size: 9px; padding: 2px 7px; }

  /* 레이아웃 전환: 세로 스택 */
  .app {
    display: flex;
    flex-direction: column;
    height: calc(100dvh - 46px);
    position: relative;
    overflow: hidden;
  }

  /* 지도: 상단 고정 */
  #map {
    flex: 1;
    min-height: 0;
    width: 100%;
    z-index: 1;
  }

  /* 사이드바 → 하단 시트 */
  .sidebar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: auto;
    max-height: 75dvh;
    border-right: none;
    border-top: 1px solid var(--border2);
    border-radius: 16px 16px 0 0;
    z-index: 100;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }

  /* 시트 드래그 핸들 */
  .sidebar::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 10px auto 0;
    flex-shrink: 0;
  }

  /* 시트 접힘/펼침 */
  .sidebar.collapsed { transform: translateY(calc(100% - 56px)); }

  /* 탭바 터치 영역 확대 */
  .tabs { height: 46px; cursor: pointer; }
  .tab { height: 44px; font-size: 12px; }

  /* 패널 높이 제한 */
  .panel.active { max-height: calc(75dvh - 46px); }
  .sl { -webkit-overflow-scrolling: touch; }
  .its { -webkit-overflow-scrolling: touch; }

  /* 결과 카드 터치 최적화 */
  .rc-body { padding: 12px 10px 10px; }
  .rc-save-col { min-width: 52px; padding: 0 12px; }
  .save-star { font-size: 24px; }

  /* 즐겨찾기 카드 */
  .sv-h { padding: 13px 12px; min-height: 58px; }
  .sv-tile { width: 42px; min-height: 46px; }
  .sv-tile-em { font-size: 22px; }

  /* 버튼 터치 영역 */
  .btn { padding: 11px 16px; }
  .btn-sm { padding: 8px 12px; font-size: 11px; }
  .btn-gh { padding: 8px 12px; }

  /* 검색 입력 */
  .si { font-size: 16px; } /* 16px 미만이면 iOS에서 자동 줌인 방지 */
  .ph { padding: 12px 14px; }

  /* 일정 탭바 */
  .day-tab-bar { padding: 8px 10px; }
  .day-tab { padding: 6px 14px; font-size: 14px; }

  /* 스톱 카드 */
  .sc-name { font-size: 14px; }
  .sc-addr { font-size: 11px; }
  .sc-time { font-size: 13px; width: 96px; }

  /* 교통수단 버튼 */
  .tm-btn { padding: 6px 10px; font-size: 12px; }

  /* 지도 위에 탭 전환 플로팅 버튼 */
  .map-tab-bar {
    display: flex !important;
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 50;
    background: rgba(15,12,9,0.88);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 4px;
    gap: 2px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  .map-tab-pill {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted2);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    transition: all .2s;
    white-space: nowrap;
  }
  .map-tab-pill.active {
    background: var(--red);
    color: #fff;
  }

  /* 검색 결과 빠른 지도 보기 버튼 크게 */
  .map-btn { padding: 7px 12px; font-size: 11px; }

  /* 이모지 피커 위치 조정 */
  #ep-guide { width: calc(100vw - 32px) !important; left: 16px !important; }

  /* 모달 */
  .modal-bx { padding: 24px 20px; }
}

/* 데스크탑에서 map-tab-bar 숨기기 */
.map-tab-bar { display: none; }

</style>
</head>
<body>
<header>
  <div class="hd-bar"></div>
  <div class="hd-title">SHANGHAI TRAVEL PLANNER</div>
  <div class="hd-sep"></div>
  <div class="hd-sub">장소검색 · 즐겨찾기 · 일정계획</div>
  <div class="hd-right">
    <span class="pill pill-r">Google Maps</span>
    <span class="pill pill-g">Beta</span>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('search')" id="tab-search">🔍 장소 검색</button>
      <button class="tab" onclick="switchTab('saved')" id="tab-saved">⭐ 즐겨찾기</button>
      <button class="tab" onclick="switchTab('itinerary')" id="tab-itinerary">🗺 일정</button>
    </div>

    <!-- SEARCH -->
    <div class="panel active" id="panel-search">
      <div class="ph">
        <div class="ph-label">장소 · 주소 검색</div>
        <div class="srow">
          <input class="si" id="searchInput" placeholder="外滩, The Bund, 外滩, 예원..."/>
          <button class="btn btn-r" onclick="searchPlaces()">검색</button>
        </div>
        <div class="hint">💡 한국어·영어·中文 모두 지원 · 오른쪽 ⭐로 즐겨찾기 저장</div>
      </div>
      <div class="sl" id="resultsList">
        <div class="empty"><div class="empty-i">🏙</div><div class="empty-t">상하이 장소를 검색하세요<br>한국어, 영어, 중국어 모두 입력 가능합니다</div></div>
      </div>
      <div class="sbar"><div class="sdot" id="sdot"></div><span id="stxt">준비됨</span></div>
    </div>

    <!-- SAVED -->
    <div class="panel" id="panel-saved">
      <div class="ph">
        <div class="ph-label">저장된 장소</div>
        <div class="sv-header-row">
          <span style="font-size:11px;color:var(--muted2)">이모지 · 이름 편집 · ▾ 메모</span>
          <div style="display:flex;gap:6px;">
            <button class="btn-gh" style="font-size:10px;padding:4px 9px" onclick="exportSaved()">📤 내보내기</button>
            <button class="btn-gh" style="font-size:10px;padding:4px 9px" onclick="document.getElementById('importFile').click()">📥 가져오기</button>
          </div>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importSaved(event)"/>
      </div>
      <div class="sl" id="savedList">
        <div class="empty"><div class="empty-i">⭐</div><div class="empty-t">저장된 장소가 없습니다<br>검색 결과 카드 오른쪽 ⭐로 저장하세요</div></div>
      </div>
    </div>

    <!-- ITINERARY -->
    <div class="panel" id="panel-itinerary">
      <!-- Day tabs -->
      <div class="day-tab-bar" id="dayTabBar"></div>
      <!-- Day content -->
      <div class="its" id="itinContent">
        <div class="empty" id="itinEmpty"><div class="empty-i">🗓</div><div class="empty-t">일정이 없습니다<br>+ 버튼으로 날짜를 추가하세요</div></div>
      </div>
      <div style="padding:8px 11px;flex-shrink:0;border-top:1px solid var(--border);">
        <button class="btn-gh" style="width:100%;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px" onclick="exportItinerary()">📤 일정 내보내기</button>
      </div>
    </div>
  </div>

  <!-- 모바일: 지도 위 플로팅 탭 버튼 -->
  <div class="map-tab-bar" id="mapTabBar">
    <button class="map-tab-pill active" id="mtp-search" onclick="mobileTab('search')">🔍 검색</button>
    <button class="map-tab-pill" id="mtp-saved"  onclick="mobileTab('saved')">⭐ 즐겨찾기</button>
    <button class="map-tab-pill" id="mtp-itinerary" onclick="mobileTab('itinerary')">🗺 일정</button>
  </div>
  <div id="map"></div>
</div>

<script>
// ══ STATE ═══════════════════════════════════════════
var map, pSvc, dSvc, mapMkrs=[], routeRnd=[], searchRes=[];
// ── 이전 버전 데이터 자동 복구 ──────────────────────────
// 버전마다 localStorage 키가 달랐습니다. 모든 이전 키에서 데이터를 찾아 병합합니다.
(function migrateOldData(){
  var OLD_SAVED_KEYS = ['sh7_saved','sh6_saved','sh5_saved','sh4_saved','sh3_saved','sh2_saved','sh_saved'];
  var OLD_ITIN_KEYS  = ['sh7_itin', 'sh6_itin', 'sh5_itin', 'sh4_itin', 'sh3_itin', 'sh2_itin', 'sh_itin'];

  // Only migrate once
  if(localStorage.getItem('shp_migrated')) return;

  var merged = [];
  var seenIds = {};

  OLD_SAVED_KEYS.forEach(function(key){
    try{
      var data = JSON.parse(localStorage.getItem(key) || '[]');
      if(!Array.isArray(data)) return;
      data.forEach(function(p){
        if(!p || !p.name) return;
        // Deduplicate by place_id or lat/lng
        var uid = p.place_id || (p.osm_id ? 'osm_'+p.osm_id : null) || (p.lat+'_'+p.lng);
        if(uid && seenIds[uid]) return;
        if(uid) seenIds[uid] = true;
        // Normalize fields across versions
        if(!p.emoji) p.emoji = '📍';
        if(!p.customName) p.customName = p.name;
        if(!p.memo) p.memo = '';
        // osm -> google Maps field normalization
        if(p.lng === undefined && p.lon !== undefined) p.lng = p.lon;
        merged.push(p);
      });
    }catch(e){}
  });

  if(merged.length > 0){
    // Merge with any existing shp_saved data
    var current = JSON.parse(localStorage.getItem('shp_saved') || '[]');
    var combined = current.concat(merged);
    localStorage.setItem('shp_saved', JSON.stringify(combined));
  }

  // Migrate itinerary (use most recent non-empty one)
  if(!localStorage.getItem('shp_itin')){
    for(var i=0;i<OLD_ITIN_KEYS.length;i++){
      try{
        var itinData = JSON.parse(localStorage.getItem(OLD_ITIN_KEYS[i]) || '[]');
        if(Array.isArray(itinData) && itinData.length > 0){
          localStorage.setItem('shp_itin', JSON.stringify(itinData));
          break;
        }
      }catch(e){}
    }
  }

  localStorage.setItem('shp_migrated','1');
})();

var saved  = JSON.parse(localStorage.getItem('shp_saved')  || '[]');
var itin   = JSON.parse(localStorage.getItem('shp_itin')   || '[]');
var epFreq = JSON.parse(localStorage.getItem('shp_epfreq') || '["📍","🏠","🍜","☕","🚇","✈️","🎯","⭐","❤️","📷","🏨","🌿","🎭","🛍","🏛","🌊","🗼"]');
var activeDayIdx = 0;
var dragDay=null, dragIdx=null, openPickerIdx=-1;

// ══ MAP INIT ════════════════════════════════════════
window.initMap = function(){
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:31.2304,lng:121.4737}, zoom:13,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a1410'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a7a68'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0f0c09'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2218'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a2e1e'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0a1520'}]},
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#142014'}]},
    ]
  });
  pSvc = new google.maps.places.PlacesService(map);
  dSvc = new google.maps.DirectionsService();
  document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')searchPlaces();});
  setSt('준비됨');
  renderSaved(); renderItinerary();
};

// ══ TABS ════════════════════════════════════════════
function switchTab(t){
  ['search','saved','itinerary'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('panel-'+x).classList.toggle('active',x===t);
  });
  if(t==='search')    { clearMkrs(); clearRnd(); }
  if(t==='saved')     { renderSaved(); }
  if(t==='itinerary') { renderItinerary(); if(itin[activeDayIdx]&&itin[activeDayIdx].stops&&itin[activeDayIdx].stops.length) showDayOnMap(activeDayIdx); }
}

// ══ MOBILE BOTTOM SHEET ════════════════════════════
var _sheetOpen = false;
function isMobile(){ return window.innerWidth <= 768; }

function mobileTab(t){
  // Update floating pill active state
  ['search','saved','itinerary'].forEach(function(x){
    var el = document.getElementById('mtp-'+x);
    if(el) el.classList.toggle('active', x===t);
  });
  // Sync main tabs
  switchTab(t);
  // Open sheet
  openSheet();
}

function openSheet(){
  var sb = document.querySelector('.sidebar');
  if(!sb) return;
  sb.classList.remove('collapsed');
  _sheetOpen = true;
}
function closeSheet(){
  var sb = document.querySelector('.sidebar');
  if(!sb) return;
  sb.classList.add('collapsed');
  _sheetOpen = false;
}
function toggleSheet(){
  if(_sheetOpen) closeSheet(); else openSheet();
}

// Tap on tab bar always opens sheet
document.addEventListener('DOMContentLoaded', function(){
  if(!isMobile()) return;
  // Initially collapsed on mobile
  var sb = document.querySelector('.sidebar');
  if(sb) sb.classList.add('collapsed');

  // Tap anywhere on .tabs toggles sheet
  var tabs = document.querySelector('.tabs');
  if(tabs){
    tabs.addEventListener('click', function(){
      // small delay so switchTab fires first
      setTimeout(function(){ openSheet(); }, 10);
    });
  }

  // Drag-to-dismiss: swipe down closes sheet
  var startY=0, dragging=false;
  var sb2 = document.querySelector('.sidebar');
  if(sb2){
    sb2.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;dragging=true;},{passive:true});
    sb2.addEventListener('touchend',function(e){
      if(!dragging)return; dragging=false;
      var dy=e.changedTouches[0].clientY-startY;
      if(dy>60) closeSheet();
    },{passive:true});
  }

  // Tap on map closes sheet
  document.getElementById('map').addEventListener('click',function(){
    if(isMobile()&&_sheetOpen) closeSheet();
  });
});

// ══ SEARCH ══════════════════════════════════════════

function searchPlaces(){
  var q=document.getElementById('searchInput').value.trim(); if(!q)return;
  setSt('검색 중...',true); clearMkrs();
  pSvc.textSearch({query:q+' Shanghai',location:{lat:31.2304,lng:121.4737},radius:60000},function(res,st){
    if(st===google.maps.places.PlacesServiceStatus.OK && res.length){
      searchRes=res.slice(0,10); renderResults(); setSt(res.length+'개 결과');
    } else {
      setEmpty('resultsList','🔍','결과를 찾을 수 없습니다<br>다른 키워드로 시도해보세요'); setSt('결과 없음');
    }
  });
}

function renderResults(){
  var list=document.getElementById('resultsList'); list.innerHTML=''; clearMkrs();
  var bnds=new google.maps.LatLngBounds();
  searchRes.forEach(function(p,i){
    var saved_=saved.some(function(s){return s.place_id===p.place_id;});
    var card=document.createElement('div'); card.className='rc';
    card.innerHTML=
      '<div class="rc-accent"></div>'+
      '<div class="rc-body">'+
        '<span class="rc-type-badge">'+getType(p.types)+'</span>'+
        '<div class="rc-name">'+esc(p.name)+'</div>'+
        '<div class="rc-addr">📍 '+esc(p.formatted_address||'')+'</div>'+
        '<div class="rc-actions">'+
          '<button class="map-btn" onclick="focusRes('+i+')">🗺 지도</button>'+
          '<a class="amap-a" href="https://uri.amap.com/search?keyword='+encodeURIComponent(p.name)+'&city=上海" target="_blank">고덕지도 ↗</a>'+
        '</div>'+
      '</div>'+
      '<div class="rc-save-col'+(saved_?' saved':'')+'" id="sc-'+i+'" onclick="toggleSave('+i+')" title="즐겨찾기">'+
        '<span class="save-star">⭐</span>'+
        '<span class="save-label">'+(saved_?'저장됨':'저장')+'</span>'+
      '</div>';
    card.querySelector('.rc-body').addEventListener('click',function(e){if(!e.target.closest('button,a'))focusRes(i);});
    list.appendChild(card);
    if(p.geometry&&p.geometry.location){
      var mk=new google.maps.Marker({position:p.geometry.location,map:map,title:p.name,
        label:{text:String(i+1),color:'#fff',fontSize:'11px',fontWeight:'700'},
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:13,fillColor:'#C8102E',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});
      mk.addListener('click',function(){focusRes(i);}); mapMkrs.push(mk); bnds.extend(p.geometry.location);
    }
  });
  if(mapMkrs.length>1)map.fitBounds(bnds);
  else if(mapMkrs.length===1){map.setCenter(mapMkrs[0].getPosition());map.setZoom(17);}
}

function focusRes(i){
  var p=searchRes[i]; if(!p.geometry||!p.geometry.location)return;
  map.panTo(p.geometry.location); map.setZoom(17);
  document.querySelectorAll('.rc').forEach(function(el,j){el.classList.toggle('sel',j===i);});
  mapMkrs.forEach(function(m,j){m.setIcon({path:google.maps.SymbolPath.CIRCLE,scale:j===i?18:13,
    fillColor:j===i?'#D4A030':'#C8102E',fillOpacity:1,strokeColor:'#fff',strokeWeight:2});});
}

function toggleSave(i){
  var p=searchRes[i]; var name=p.name;
  var idx=saved.findIndex(function(s){return s.place_id===p.place_id;});
  var col=document.getElementById('sc-'+i);
  if(idx>=0){
    saved.splice(idx,1);
    col.classList.remove('saved'); col.querySelector('.save-label').textContent='저장';
    notify('즐겨찾기에서 제거됨');
  } else {
    saved.push({place_id:p.place_id,name:name,customName:name,
      address:p.formatted_address||'',
      lat:p.geometry.location.lat(),lng:p.geometry.location.lng(),
      types:p.types||[], memo:'', emoji:'📍'});
    col.classList.add('saved'); col.querySelector('.save-label').textContent='저장됨';
    notify('"'+name+'" 저장됨');
  }
  persist();
}

// ══ SAVED LIST ══════════════════════════════════════
function renderSaved(){
  var list=document.getElementById('savedList');
  if(!saved.length){setEmpty('savedList','⭐','저장된 장소가 없습니다<br>검색 결과 오른쪽 ⭐로 저장하세요');return;}
  list.innerHTML='';
  // Show all saved pins on map when on saved tab
  showSavedPinsOnMap();
  saved.forEach(function(p,i){
    var c=document.createElement('div'); c.className='sv';
    c.innerHTML=
      '<div class="sv-h" onclick="toggleSvBody('+i+')" onmouseenter="hlSavedPin('+i+',true)" onmouseleave="hlSavedPin('+i+',false)">'+
        '<div class="sv-tile" onclick="event.stopPropagation();openEmoji('+i+',this)" title="이모지 변경">'+
          '<span class="sv-tile-num">'+(i+1)+'</span>'+
          '<span class="sv-tile-em" id="em-'+i+'">'+esc(p.emoji||'📍')+'</span>'+
        '</div>'+
        '<div class="sv-info">'+
          '<input class="sv-nedit" value="'+esc(p.customName||p.name)+'" onclick="event.stopPropagation()" onchange="updName('+i+',this.value)"/>'+
          '<div class="sv-adr">'+esc(p.address)+'</div>'+
        '</div>'+
        '<button class="sv-exp" id="svx-'+i+'">▾</button>'+
      '</div>'+
      '<div class="sv-body" id="svb-'+i+'">'+
        '<div class="memo-lbl">메모</div>'+
        '<textarea class="memo-ta" rows="3" placeholder="영업시간, 입장료, 추천 메뉴..." onchange="updMemo('+i+',this.value)">'+esc(p.memo||'')+'</textarea>'+
        '<div class="sv-ba">'+
          '<button class="btn btn-r btn-sm" onclick="focusSvPin('+i+')">지도 보기</button>'+
          '<a class="amap-a" href="https://uri.amap.com/search?keyword='+encodeURIComponent(p.name)+'&city=上海" target="_blank">고덕지도 ↗</a>'+
          '<button class="btn-del" onclick="delSv('+i+')">삭제</button>'+
        '</div>'+
      '</div>';
    list.appendChild(c);
  });
}

var _svMkrs=[];
function showSavedPinsOnMap(){
  clearMkrs(); _svMkrs=[];
  if(!saved.length)return;
  var bnds=new google.maps.LatLngBounds();
  saved.forEach(function(p,i){
    if(!p.lat||!p.lng)return;
    var mk=makeSvMarker(p,i,false);
    (function(mk,p,i){
      var iw=new google.maps.InfoWindow({content:'<div style="font-family:sans-serif;padding:2px;">'+
        '<strong style="font-size:13px;">'+(i+1)+'. '+(p.customName||p.name)+'</strong>'+
        (p.address?'<br><span style="font-size:10px;color:#888;">'+p.address.slice(0,45)+'</span>':'')+
      '</div>'});
      mk.addListener('click',function(){iw.open(map,mk);});
    })(mk,p,i);
    mapMkrs.push(mk); _svMkrs.push(mk); bnds.extend({lat:p.lat,lng:p.lng});
  });
  if(mapMkrs.length===1){map.panTo({lat:saved[0].lat,lng:saved[0].lng});map.setZoom(16);}
  else if(!bnds.isEmpty())map.fitBounds(bnds,{top:40,right:40,bottom:40,left:40});
}

function makeSvMarker(p,i,highlight){
  var color=highlight?'#D4A030':'#C8102E';
  var size=highlight?16:13;
  return new google.maps.Marker({
    position:{lat:p.lat,lng:p.lng}, map:map, title:p.customName||p.name, zIndex:highlight?999:100+i,
    label:{text:String(i+1),color:'#fff',fontSize:'10px',fontWeight:'700'},
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:size,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
  });
}

function hlSavedPin(i,on){
  var mk=_svMkrs[i]; if(!mk)return;
  mk.setIcon({path:google.maps.SymbolPath.CIRCLE,scale:on?18:13,fillColor:on?'#D4A030':'#C8102E',fillOpacity:1,strokeColor:'#fff',strokeWeight:2});
  mk.setZIndex(on?999:100+i);
  if(on){var p=saved[i];if(p&&p.lat)map.panTo({lat:p.lat,lng:p.lng});}
}

function focusSvPin(i){var p=saved[i];if(!p.lat||!p.lng)return;map.panTo({lat:p.lat,lng:p.lng});map.setZoom(16);}
function toggleSvBody(i){document.getElementById('svb-'+i).classList.toggle('open');document.getElementById('svx-'+i).classList.toggle('open');}
function updName(i,v){saved[i].customName=v.trim()||saved[i].name;persist();}
function updMemo(i,v){saved[i].memo=v;persist();}
function delSv(i){var n=saved[i].customName||saved[i].name;saved.splice(i,1);persist();renderSaved();notify('"'+n+'" 삭제됨');}

// ══ EXPORT / IMPORT ═════════════════════════════════
function exportSaved(){
  if(!saved.length){notify('저장된 장소가 없습니다');return;}
  var blob=new Blob([JSON.stringify({version:1,places:saved},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='shanghai-favorites-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  notify('즐겨찾기 '+saved.length+'개 내보내기 완료');
}
function importSaved(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result); var places=d.places||d; var added=0,skip=0;
      if(!Array.isArray(places))throw new Error('형식 오류');
      places.forEach(function(p){
        if(!p.name||(!p.lat&&!p.lng)){return;}
        var ex=saved.some(function(s){return s.place_id===p.place_id||(Math.abs((s.lat||0)-(p.lat||0))<0.0001&&Math.abs((s.lng||0)-(p.lng||0))<0.0001);});
        if(ex){skip++;return;} saved.push(p); added++;
      });
      persist(); renderSaved(); notify('✅ '+added+'개 가져오기'+(skip?' · '+skip+'개 중복 건너뜀':''));
    }catch(err){notify('⚠ 파일 오류: '+err.message);}
    e.target.value='';
  };
  r.readAsText(f);
}

// ══ ITINERARY ═══════════════════════════════════════
function renderItinerary(){
  var tabBar=document.getElementById('dayTabBar');

  tabBar.innerHTML='';

  });

  addBtn.className='day-tab add-day'; addBtn.textContent='+ 추가';
  addBtn.onclick=addDay; tabBar.appendChild(addBtn);

  var opts=saved.map(function(p,pi){return'<option value="'+pi+'">'+esc(p.emoji||'📍')+' '+esc(p.customName||p.name)+'</option>';}).join('');

  var panel=document.createElement('div');
  panel.className='day-panel active';
  panel.innerHTML=
    '<div class="day-header-card">'+
      '<div class="day-num-label">DAY '+(activeDayIdx+1)+'</div>'+
      '<input class="day-date-input" type="date" value="'+(day.date||'')+'" onchange="updDate('+activeDayIdx+',this.value)" placeholder="날짜 선택"/>'+
      '<div class="day-map-btn" style="display:flex;gap:6px;margin-left:auto;">'+
        '<button class="btn-gh" style="font-size:10px;padding:4px 10px" onclick="showDayOnMap('+activeDayIdx+')">🗺 지도 보기</button>'+
        '<button class="btn-del" onclick="delDay('+activeDayIdx+')">삭제</button>'+
      '</div>'+
    '</div>'+
    '<div class="stops-container" id="sc-day">'+buildStopsHtml(day,activeDayIdx)+'</div>'+
    '<div class="add-wrap">'+
      (saved.length?'<select class="add-sel" onchange="addStop('+activeDayIdx+',this)"><option value="">+ 저장된 장소 추가...</option>'+opts+'</select>':
      '<div style="font-size:11px;color:var(--muted2);text-align:center;padding:4px">즐겨찾기에 장소를 먼저 저장하세요</div>')+

function buildStopsHtml(day,di){
  if(!day.stops||!day.stops.length)
    return'<div style="font-size:11px;color:var(--muted2);text-align:center;padding:14px">아래에서 장소를 추가하세요</div>';
  var html='';
  day.stops.forEach(function(s,si){
    html+=
      '<div class="stop-row" draggable="true" data-di="'+di+'" data-si="'+si+'">'+
        '<div class="stl"><div class="st-circ">'+(si+1)+'</div>'+(si<day.stops.length-1?'<div class="st-line"></div>':'')+' </div>'+
        '<div class="sc">'+
          '<div class="sc-top">'+
            '<div style="flex:1;min-width:0">'+
              '<div class="sc-name">'+(s.emoji||'')+'  '+esc(s.customName||s.name)+'</div>'+
              '<div class="sc-addr">'+esc(s.address)+'</div>'+
            '</div>'+
            '<button class="drag-h" title="드래그로 순서 변경">⠿</button>'+
            '<button class="rm-stop" onclick="rmStop('+di+','+si+')">✕</button>'+
          '</div>'+
          '<div class="sc-time-row">'+
            '<input class="sc-time" type="time" value="'+(s.time||'')+'" onchange="updStopTime('+di+','+si+',this.value)"/>'+
            '<span style="font-size:10px;color:var(--muted2)">방문 시간</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    if(si<day.stops.length-1) html+=buildTs(di,si,(day.segments||[])[si]);
  });
  return html;
}

function buildTs(di,si,seg){
  var modes=[{k:'WALKING',l:'🚶 도보',a:'a-walk'},{k:'SUBWAY',l:'🚇 지하철',a:'a-subway'},{k:'DRIVING',l:'🚕 택시',a:'a-taxi'},{k:'TRANSIT',l:'🚌 버스',a:'a-bus'}];
  return'<div class="ts"><div class="ts-tl"><div class="ts-arrow">↕</div></div>'+
    '<div class="ts-box"><div class="ts-modes">'+
      modes.map(function(m){return'<button class="tm-btn '+(seg&&seg.mode===m.k?m.a:'')+'" onclick="calcRoute('+di+','+si+',\''+m.k+'\',this)">'+m.l+'</button>';}).join('')+
    '</div><div class="ts-result" id="tr-'+di+'-'+si+'">'+(seg?buildTrHtml(seg):'')+'</div></div></div>';
}

function buildTrHtml(seg){
  if(!seg||!seg.duration)return'';
  if(seg.mode==='SUBWAY'&&seg.steps&&seg.steps.length)return buildSubwayCard(seg);
  var h='<span class="tr-dur">'+seg.duration+'</span>';
  if(seg.distance)h+='<span class="tr-dist">'+seg.distance+'</span>';
  if(seg.fare)h+='<span class="tr-fare">'+seg.fare+'</span>';
  if(seg.note)h+='<span class="tr-note">'+seg.note+'</span>';
  return h;
}

function buildSubwayCard(seg){
  var steps=seg.steps.map(function(st,i){
    var icon=st.type==='walk'?'🚶':st.type==='transfer'?'🔄':'🚇';
    var badge=st.line?'<span class="step-line-badge" style="background:'+esc(st.lineColor||'#C8102E')+'">'+esc(st.line)+'</span>':'';
    return'<div class="subway-step"><span class="step-icon">'+icon+'</span><div class="step-body"><div class="step-desc">'+badge+esc(st.desc)+'</div>'+(st.detail?'<div class="step-detail">'+esc(st.detail)+'</div>':'')+'</div>'+(st.time?'<span class="step-time">'+esc(st.time)+'</span>':'')+'</div>';
  }).join('');
  return'<div class="subway-card"><div class="subway-summary"><span class="tr-dur">총 '+seg.duration+'</span>'+(seg.distance?'<span class="tr-dist">'+seg.distance+'</span>':'')+(seg.fare?'<span class="tr-fare">'+seg.fare+'</span>':'')+'</div><div class="subway-steps">'+steps+'</div>'+(seg.note?'<div class="tr-note" style="margin-top:5px">'+seg.note+'</div>':'')+'</div>';
}

// ══ DRAG & DROP ═════════════════════════════════════
function initDrag(day,di){
  var wrap=document.getElementById('sc-day');if(!wrap)return;
  wrap.querySelectorAll('.stop-row').forEach(function(row){
    row.addEventListener('dragstart',function(e){dragDay=di;dragIdx=parseInt(row.dataset.si);row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',function(){row.classList.remove('dragging');wrap.querySelectorAll('.stop-row').forEach(function(r){r.classList.remove('drag-over');});});
    row.addEventListener('dragover',function(e){e.preventDefault();wrap.querySelectorAll('.stop-row').forEach(function(r){r.classList.remove('drag-over');});row.classList.add('drag-over');});
    row.addEventListener('drop',function(e){
      e.preventDefault();var ti=parseInt(row.dataset.si);
      if(dragDay!==di||dragIdx===ti)return;
      var mv=itin[di].stops.splice(dragIdx,1)[0];itin[di].stops.splice(ti,0,mv);
      itin[di].segments=[];persist();renderItinerary();notify('순서 변경됨');
    });
  });
}

// ══ MAP: DAY ROUTE ══════════════════════════════════
// 직선 점선으로 장소를 순서대로 연결. 같은 위치의 장소는 겹쳐 표시.
function showDayOnMap(di){
  var day=itin[di];if(!day||!day.stops||!day.stops.length)return;
  clearMkrs();clearRnd();
  var bnds=new google.maps.LatLngBounds();
  var validStops=day.stops.filter(function(s){return s.lat&&s.lng;});
  if(!validStops.length)return;

  // ① 같은 위치 장소 그룹핑 (0.0003도 ≈ 약 30m 이내를 같은 위치로 판단)
  function samePos(a,b){return Math.abs(a.lat-b.lat)<0.0003&&Math.abs(a.lng-b.lng)<0.0003;}

  validStops.forEach(function(s,i){
    // 이 장소와 같은 위치인 다른 장소들의 번호 수집
    var sameNums=[];
    validStops.forEach(function(t,j){
      if(samePos(s,t)) sameNums.push(j+1);
    });
    // 첫 번째로 등장하는 위치만 핀을 그림 (중복 방지)
    var firstIdx=validStops.findIndex(function(t){return samePos(s,t);});
    if(firstIdx!==i){bnds.extend({lat:s.lat,lng:s.lng});return;}

    // 겹친 번호들을 하나의 라벨로 합침 (예: "1·7")
    var labelText=sameNums.join('·');
    var isMulti=sameNums.length>1;

    var mk=new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng},map:map,
      title:s.customName||s.name,
      zIndex:200+i,
      label:{
        text:labelText,
        color:'#fff',
        fontSize: isMulti?'9px':'11px',
        fontWeight:'700'
      },
      icon:{
        path:google.maps.SymbolPath.CIRCLE,
        scale: isMulti?18:15,
        fillColor:'#C8102E',
        fillOpacity:1,
        strokeColor:'#fff',
        strokeWeight: isMulti?3:2.5
      }
    });

    // 클릭 시 겹친 장소 모두 표시
    (function(mk,stops,nums){
      var names=nums.map(function(n){return n+'. '+(stops[n-1].customName||stops[n-1].name);}).join('<br>');
      var times=nums.map(function(n){return stops[n-1].time?'⏰ '+stops[n-1].time:'';}).filter(Boolean).join(' / ');
      var iw=new google.maps.InfoWindow({content:
        '<div style="font-family:sans-serif;padding:3px 5px;min-width:130px;">'+
          '<div style="font-size:13px;font-weight:600;color:#111;line-height:1.6;">'+names+'</div>'+
          (times?'<div style="font-size:10px;color:#888;margin-top:2px;">'+times+'</div>':'')+
        '</div>'
      });
      mk.addListener('click',function(){iw.open(map,mk);});
    })(mk,validStops,sameNums);

    mapMkrs.push(mk);
    bnds.extend({lat:s.lat,lng:s.lng});
  });

  // ② 직선 점선으로 순서대로 연결
  if(validStops.length>1){
    var path=validStops.map(function(s){return{lat:s.lat,lng:s.lng};});

    // 점선 배경선 (약간 어두운 테두리 효과)
    var bgLine=new google.maps.Polyline({
      path:path,geodesic:true,map:map,zIndex:48,
      strokeColor:'rgba(0,0,0,0.3)',strokeWeight:6,strokeOpacity:.4
    });
    routeRnd.push({setMap:function(m){bgLine.setMap(m);}});

    // 메인 점선
    var dashLine=new google.maps.Polyline({
      path:path,geodesic:true,map:map,zIndex:50,
      strokeColor:'#D4A030',strokeOpacity:0,strokeWeight:4,
      icons:[
        // 점선 패턴
        {
          icon:{path:'M 0,-1 0,1',strokeOpacity:1,scale:3.5,strokeColor:'#D4A030'},
          offset:'0',repeat:'18px'
        },
        // 도착지 화살표
        {
          icon:{
            path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
            scale:4,
            strokeColor:'#D4A030',
            fillColor:'#D4A030',
            fillOpacity:1,
            strokeOpacity:1,
            strokeWeight:1
          },
          offset:'100%'
        }
      ]
    });
    routeRnd.push({setMap:function(m){dashLine.setMap(m);}});

    // 각 구간 중간에 작은 화살표 방향 표시
    for(var i=0;i<path.length-1;i++){
      (function(from,to){
        var midLat=(from.lat+to.lat)/2;
        var midLng=(from.lng+to.lng)/2;
        var segLine=new google.maps.Polyline({
          path:[from,to],geodesic:true,map:map,zIndex:49,
          strokeColor:'#D4A030',strokeOpacity:0,strokeWeight:1,
          icons:[{
            icon:{
              path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
              scale:3,
              strokeColor:'#D4A030',
              fillColor:'#D4A030',
              fillOpacity:.9,
              strokeOpacity:.9,
              strokeWeight:1
            },
            offset:'50%'
          }]
        });
        routeRnd.push({setMap:function(m){segLine.setMap(m);}});
      })(path[i],path[i+1]);
    }
  }

  if(!bnds.isEmpty()) map.fitBounds(bnds,{top:60,right:60,bottom:60,left:60});
}

// ══ ROUTE CALC (개별 구간 교통수단 계산) ════════════════
// clearRnd()를 호출하지 않고 개별 구간 정보만 업데이트.
// 지도의 전체 경로는 showDayOnMap이 책임집니다.
function calcRoute(di,si,mode,btn){
  var day=itin[di],from=day.stops[si],to=day.stops[si+1];if(!from||!to)return;
  btn.closest('.ts-modes').querySelectorAll('.tm-btn').forEach(function(b){b.className='tm-btn';});
  var mc={WALKING:'a-walk',SUBWAY:'a-subway',DRIVING:'a-taxi',TRANSIT:'a-bus'};
  btn.classList.add(mc[mode]);
  var el=document.getElementById('tr-'+di+'-'+si);
  if(el)el.innerHTML='<span class="tr-load">계산 중...</span>';

  if(mode==='SUBWAY'){calcSubwayEst(di,si,from,to,el);return;}

  var gMode=mode==='TRANSIT'?google.maps.TravelMode.TRANSIT:mode==='WALKING'?google.maps.TravelMode.WALKING:google.maps.TravelMode.DRIVING;
  var req={origin:{lat:from.lat,lng:from.lng},destination:{lat:to.lat,lng:to.lng},travelMode:gMode,region:'CN'};
  if(mode==='TRANSIT')req.transitOptions={modes:[google.maps.TransitMode.BUS]};
  dSvc.route(req,function(res,st){
    if(st==='OK'){
      var leg=res.routes[0].legs[0];var km=leg.distance.value/1000;
      var seg={mode:mode,duration:leg.duration.text,distance:leg.distance.text,fare:getFare(mode,km),note:getNote(mode)};
      if(!itin[di].segments)itin[di].segments=[];itin[di].segments[si]=seg;persist();
      if(el)el.innerHTML=buildTrHtml(seg);
    } else {if(el)el.innerHTML='<span class="tr-note">경로 없음 ('+st+')</span>';}
  });
}

function calcSubwayEst(di,si,from,to,el){
  var km=haversine(from.lat,from.lng,to.lat,to.lng),akm=km*1.4;
  var dur=Math.round(akm/35*60+8);var fare=shFare(akm);
  var seg={mode:'SUBWAY',duration:'약 '+dur+'분',distance:km.toFixed(1)+'km',fare:'¥'+fare+'~'+(fare+1),steps:[],
    note:'※ Google Maps 중국 지하철 미지원 · 요금표 기반 추정 · 고덕지도 확인 권장'};
  if(!itin[di].segments)itin[di].segments=[];itin[di].segments[si]=seg;persist();
  if(el)el.innerHTML=buildTrHtml(seg);
}

function shFare(km){if(km<=4)return 3;if(km<=10)return 4;if(km<=16)return 5;if(km<=24)return 6;if(km<=32)return 7;return 7+Math.ceil((km-32)/16);}
function getFare(m,km){if(m==='WALKING')return'무료';if(m==='DRIVING'){var b=km<=3?14:14+(km-3)*2.5;return'¥'+Math.round(b)+'~'+Math.round(b*1.25)+' (디디 추정)';}if(m==='TRANSIT')return'¥1~2';return'';}
function getNote(m){if(m==='DRIVING')return'※ 교통 상황에 따라 변동';if(m==='TRANSIT')return'※ 노선별 상이';return'';}
function haversine(a,b,c,d){var R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

// ══ STOP MANAGEMENT ═════════════════════════════════
function addDay(){itin.push({id:Date.now(),date:'',stops:[],segments:[]});activeDayIdx=itin.length-1;persist();renderItinerary();switchTab('itinerary');}
function addStop(di,sel){
  var pi=parseInt(sel.value);if(isNaN(pi)||pi<0)return;
  var p=saved[pi];itin[di].stops.push(Object.assign({},p,{time:''}));
  if(!itin[di].segments)itin[di].segments=[];sel.value='';persist();renderItinerary();showDayOnMap(di);
  notify('"'+(p.customName||p.name)+'" 추가됨');
}
function rmStop(di,si){itin[di].stops.splice(si,1);if(itin[di].segments)itin[di].segments.splice(si,1);persist();renderItinerary();}
function delDay(di){if(!confirm('Day '+(di+1)+'을 삭제할까요?'))return;itin.splice(di,1);activeDayIdx=Math.min(activeDayIdx,itin.length-1);persist();renderItinerary();}
function updDate(di,v){itin[di].date=v;persist();}
function updStopTime(di,si,v){itin[di].stops[si].time=v;persist();}

// ══ EXPORT ITINERARY ════════════════════════════════
function exportItinerary(){
  var t='🏙 상하이 여행 일정\n'+'═'.repeat(40)+'\n\n';
  itin.forEach(function(day,di){
    t+='📅 Day '+(di+1)+(day.date?' ('+day.date+')':'')+'\n'+'─'.repeat(30)+'\n';
    (day.stops||[]).forEach(function(s,si){
      t+=(si+1)+'. '+(s.customName||s.name)+(s.time?' @ '+s.time:'')+'\n   📍 '+s.address+'\n';
      if(s.memo)t+='   📝 '+s.memo+'\n';
      var seg=(day.segments||[])[si];
      if(seg){var ic={WALKING:'🚶',SUBWAY:'🚇',DRIVING:'🚕',TRANSIT:'🚌'}[seg.mode]||'↓';
        t+='   '+ic+' '+seg.duration+' · '+(seg.distance||'')+' '+(seg.fare||'')+'\n';}
    });t+='\n';
  });
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain;charset=utf-8'}));a.download='shanghai-trip.txt';a.click();notify('내보내기 완료');
}

  });

  var field=document.getElementById('epf');
  field.addEventListener('input',function(){
    var segs=[...field.value];
    var em=segs.find(function(s){return s&&s.codePointAt&&s.codePointAt(0)>127;});
    if(em){field.value='';applyEmoji(em);}
  });
  field.addEventListener('paste',function(e){
    e.preventDefault();
    var txt=(e.clipboardData||window.clipboardData).getData('text');
    var segs=[...txt];var em=segs.find(function(s){return s&&s.codePointAt&&s.codePointAt(0)>127;});
    if(em)applyEmoji(em);else field.value=txt;
  });
  requestAnimationFrame(function(){if(field)field.focus();});

  setTimeout(function(){
    document.addEventListener('click',function h(e){
      var g2=document.getElementById('ep-guide');
      if(g2&&!g2.contains(e.target)){g2.remove();openPickerIdx=-1;document.removeEventListener('click',h);}
    });
  },100);
}

function applyEmoji(em){
  var i=openPickerIdx;if(i<0||!em)return;
  saved[i].emoji=em;persist();
  var el=document.getElementById('em-'+i);if(el)el.textContent=em;
  epFreq=epFreq.filter(function(x){return x!==em;});epFreq.unshift(em);
  if(epFreq.length>20)epFreq=epFreq.slice(0,20);
  localStorage.setItem('shp_epfreq',JSON.stringify(epFreq));
  var g=document.getElementById('ep-guide');if(g)g.remove();openPickerIdx=-1;
  notify('이모지 변경  '+em);
}

// ══ UTILS ═══════════════════════════════════════════
function clearMkrs(){mapMkrs.forEach(function(m){m.setMap(null);});mapMkrs=[];_svMkrs=[];}
function clearRnd(){routeRnd.forEach(function(r){if(r.setMap)r.setMap(null);});routeRnd=[];}
function setSt(msg,ld){document.getElementById('stxt').textContent=msg;document.getElementById('sdot').className='sdot'+(ld?' ld':'');}
function persist(){localStorage.setItem('shp_saved',JSON.stringify(saved));localStorage.setItem('shp_itin',JSON.stringify(itin));}
function notify(msg){var e=document.createElement('div');e.className='notif';e.textContent=msg;document.body.appendChild(e);setTimeout(function(){e.remove();},2600);}
function setEmpty(id,ic,tx){document.getElementById(id).innerHTML='<div class="empty"><div class="empty-i">'+ic+'</div><div class="empty-t">'+tx+'</div></div>';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getType(t){if(!t||!t.length)return'📍 장소';if(t.includes('restaurant')||t.includes('food'))return'🍜 식당';if(t.includes('lodging'))return'🏨 숙박';if(t.includes('museum'))return'🏛 박물관';if(t.includes('tourist_attraction'))return'🎯 관광지';if(t.includes('shopping_mall')||t.includes('store'))return'🛍 쇼핑';if(t.includes('park'))return'🌿 공원';if(t.includes('bar')||t.includes('night_club'))return'🍸 바';if(t.includes('cafe'))return'☕ 카페';return'📍 장소';}

// ══ API KEY BOOTSTRAP ════════════════════════════════
(function(){
  var k=new URLSearchParams(location.search).get('apikey')||localStorage.getItem('gmaps_k');
  if(!k){document.addEventListener('DOMContentLoaded',showModal);}
  else{loadMaps(k);}
})();

function loadMaps(k){
  var s=document.createElement('script');
  s.src='https://maps.googleapis.com/maps/api/js?key='+k+'&libraries=places&callback=initMap&language=ko&region=CN';
  s.onerror=function(){showModal('API 키가 유효하지 않거나 API가 비활성화 상태입니다.');};
  document.head.appendChild(s);
}

function showModal(err){
  var ex=document.querySelector('.modal-ov');if(ex)ex.remove();
  var ov=document.createElement('div');ov.className='modal-ov';
  ov.innerHTML='<div class="modal-bx">'+
    '<div class="modal-ti">Google Maps API Key</div>'+
    '<div class="modal-desc">'+
      '<a href="https://console.cloud.google.com/google/maps-apis" target="_blank" style="color:var(--red)">Google Cloud Console</a>에서 '+
      '<span style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--gold)">Maps JavaScript API · Places API · Directions API</span> 를 활성화하세요.'+
      (err?'<br><br><span style="color:#c05050">⚠ '+esc(err)+'</span>':'')+
    '</div>'+
    '<input id="aki" class="modal-mi" type="text" placeholder="AIza..."/>'+
    '<div class="modal-acts">'+
      '<button class="btn btn-r" style="flex:1" onclick="var k=document.getElementById(\'aki\').value.trim();if(!k)return;localStorage.setItem(\'gmaps_k\',k);this.closest(\'.modal-ov\').remove();loadMaps(k);">시작하기</button>'+
      '<button class="btn-gh" onclick="localStorage.removeItem(\'gmaps_k\');this.closest(\'.modal-ov\').remove();showModal();">초기화</button>'+
    '</div>'+
    '<p style="font-size:10px;color:var(--muted2);margin-top:10px;text-align:center">키는 이 기기 브라우저에만 저장됩니다</p>'+
  '</div>';
  document.body.appendChild(ov);
  setTimeout(function(){var el=document.getElementById('aki');if(el)el.focus();},80);
}
</script>
